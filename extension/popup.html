<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ask Youtube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #fff;
      color: #111;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* small grey text showing which video is detected */
    #video-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      height: 72px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: #aaa;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    /* answer box — hidden until answer arrives */
    #answer-box {
      display: none;
      margin-top: 12px;
      padding: 10px;
      background: #f6f6f6;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      color: #222;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* error message styling */
    #error-msg {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      color: #c0392b;
    }
    
  </style>
</head>
<body>

  <h1>Ask YouTube </h1>
  <p id="video-label">Detecting video...</p>

  <textarea id="question" placeholder="Ask anything about this video..."></textarea>
  <button id="ask-btn">Ask</button>

  <div id="answer-box"></div>
  <p id="error-msg"></p>

  <!-- popup.js handles all the logic -->
  <script src="popup.js"></script>

</body>
</html>
